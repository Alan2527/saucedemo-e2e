name: Regresión E2E

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite a ejecutar"
        type: choice
        default: todas
        options: [todas, login, inventario, carrito, checkout, defectos]

permissions:
  contents: write

jobs:
  regresion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar suite
        id: tests
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.suite || 'todas' }}" = "todas" ]; then
            pytest
          else
            pytest -m "${{ github.event.inputs.suite }}"
          fi

      - name: Recuperar historial previo de gh-pages
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1
          git worktree add gh-pages-anterior gh-pages
          mkdir -p allure-results/history
          cp -r gh-pages-anterior/history/. allure-results/history/ 2>/dev/null || true

      - name: Instalar Allure Commandline
        run: |
          curl -sL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          sudo tar -xzf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.29.0/bin/allure /usr/local/bin/allure

      - name: Generar reporte Allure
        run: allure generate allure-results --clean -o allure-report

      - name: Publicar reporte en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Fallar el job si hubo tests rotos
        if: steps.tests.outcome == 'failure'
        run: exit 1
