name: Regresión E2E

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite a ejecutar"
        type: choice
        default: todas
        options: [todas, login, inventario, carrito, checkout, defectos]

permissions:
  contents: write

jobs:
  regresion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar suite
        run: |
          if [ "${{ github.event.inputs.suite || 'todas' }}" = "todas" ]; then
            pytest --alluredir=allure-results
          else
            pytest -m "${{ github.event.inputs.suite }}" --alluredir=allure-results
          fi

      - name: Recuperar historial del reporte
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generar reporte Allure
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publicar reporte en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
