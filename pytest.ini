[pytest]
# Los archivos de test usan nombres descriptivos (no el patrón test_*.py),
# por eso ampliamos el descubrimiento a todos los .py del proyecto.
# Las funciones de test sí siguen la convención test_*.
python_files = *.py
python_classes = Test*
python_functions = test_*

# Carpetas que no contienen tests.
norecursedirs = .git .github allure-results allure-report __pycache__ .venv venv pages utils

addopts = -v --strict-markers --alluredir=allure-results

markers =
    login: pruebas del modulo de autenticacion
    inventario: pruebas del catalogo de productos
    carrito: pruebas del carrito de compras
    checkout: pruebas del flujo de compra
    defectos: auditoria de defectos conocidos (problem_user)
